<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNFLOW · Sovoilar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f0d;--surface:#111813;--surface2:#18211b;--surface3:#1f2b22;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#3dd68c;--green-dim:#1a6640;--green-pale:rgba(61,214,140,0.08);
  --blue:#5ba3f5;--blue-dim:#1a3a6e;--blue-pale:rgba(91,163,245,0.08);
  --amber:#f5c542;--amber-pale:rgba(245,197,66,0.10);
  --red:#f56c6c;--red-pale:rgba(245,108,108,0.08);
  --text:#e8f0ea;--text2:#7a9080;--text3:#3d5244;
  --mono:"DM Mono",monospace;--sans:"Syne",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh;}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:96px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:16px;}
.logo-wrap{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo-wrap img{height:80px;}
.logo-divider{width:1px;height:60px;background:var(--border2);}
.app-title{font-family:var(--sans);font-size:12px;font-weight:700;color:var(--green);letter-spacing:4px;text-transform:uppercase;}
.header-center{flex:1;display:flex;justify-content:center;}
.header-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}

/* BUTTONS */
.btn{font-family:var(--mono);font-size:12px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);padding:6px 14px;border-radius:6px;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--green);color:var(--green);background:var(--green-pale);}
.btn-primary{background:var(--green);color:#0a0f0d;border-color:var(--green);font-weight:500;}
.btn-primary:hover{background:#5af0a8;border-color:#5af0a8;color:#0a0f0d;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-red{border-color:rgba(245,108,108,0.3);color:var(--red);}
.btn-red:hover{background:var(--red-pale);border-color:var(--red);}

/* LAYOUT */
.app-body{display:flex;height:calc(100vh - 58px);overflow:hidden;}
.sidebar{width:256px;min-width:256px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.main{flex:1;overflow-y:auto;padding:22px 26px;}

/* SIDEBAR */
.sidebar-top{padding:16px 14px 6px;}
.sidebar-label{font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.vessel-item{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .15s;}
.vessel-item:hover{background:var(--surface2);border-color:var(--border);}
.vessel-item.active{background:var(--green-pale);border-color:var(--green-dim);}
.vessel-name{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text);}
.vessel-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.vessel-bar{height:3px;background:var(--surface3);border-radius:99px;margin-top:7px;overflow:hidden;}
.vessel-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}
.sidebar-footer{padding:10px 14px;margin-top:auto;border-top:1px solid var(--border);}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:7px;}
.kpi-val{font-family:var(--sans);font-size:24px;font-weight:800;line-height:1;}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:5px;}
.kpi.green .kpi-val{color:var(--green);}
.kpi.blue .kpi-val{color:var(--blue);}
.kpi.amber .kpi-val{color:var(--amber);}
.kpi.white .kpi-val{color:var(--text);}

/* ETC BANNER */
.etc-banner{display:flex;align-items:center;justify-content:space-between;background:var(--green-pale);border:1px solid var(--green-dim);border-radius:10px;padding:13px 18px;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.etc-title{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--green);}
.etc-detail{font-size:11px;color:var(--text2);margin-top:3px;}
.etc-badge{background:var(--green);color:#0a0f0d;font-size:11px;font-weight:600;padding:4px 14px;border-radius:99px;}

/* PROGRESS */
.prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px;}
.prog-row{margin-bottom:12px;}
.prog-row:last-child{margin-bottom:0;}
.prog-hdr{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;}
.prog-name{color:var(--text);font-weight:500;}
.prog-nums{color:var(--text2);}
.prog-track{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .5s;}

/* CONFIG PANEL */
.config-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px;}
.config-title{font-family:var(--sans);font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.config-item{display:flex;flex-direction:column;gap:4px;}
.config-label{font-size:10px;color:var(--text3);letter-spacing:.5px;}
.config-input{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 10px;width:100%;}
.config-input:focus{outline:none;border-color:var(--amber);}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{padding:9px 9px;text-align:right;font-size:10px;letter-spacing:.8px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
thead th:first-child{text-align:left;padding-left:14px;}
thead .th-grp{font-size:9px;padding:5px 9px;background:#0f1a12;color:var(--text3);letter-spacing:1px;border-bottom:1px solid var(--border);}
tbody td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap;}
tbody td:first-child{text-align:left;color:var(--text);font-weight:500;padding-left:14px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,0.012);}
tbody tr.row-sinop td{opacity:.4;}
tbody tr.row-etc td{background:var(--green-pale);}
tbody tr.row-total td{background:var(--surface2);color:var(--text);font-weight:500;border-top:1px solid var(--border2);}

/* INPUTS en tabla */
.inp-conf{background:rgba(61,214,140,0.09);border:1px solid rgba(61,214,140,0.22);border-radius:4px;color:var(--green);font-family:var(--mono);font-size:12px;width:56px;padding:3px 5px;text-align:center;transition:border .12s;}
.inp-conf:focus{outline:none;border-color:var(--green);background:rgba(61,214,140,0.15);}
.inp-conf::placeholder{color:var(--green-dim);}
.inp-proy{background:rgba(245,197,66,0.08);border:1px solid rgba(245,197,66,0.18);border-radius:4px;color:var(--amber);font-family:var(--mono);font-size:12px;width:56px;padding:3px 5px;text-align:center;transition:border .12s;}
.inp-proy:focus{outline:none;border-color:var(--amber);background:rgba(245,197,66,0.14);}
.inp-proy::placeholder{color:#6b5310;}
.inp-out{background:var(--blue-pale);border:1px solid rgba(91,163,245,0.2);border-radius:4px;color:var(--blue);font-family:var(--mono);font-size:12px;width:56px;padding:3px 5px;text-align:center;}
.inp-out:focus{outline:none;border-color:var(--blue);}

/* CHIPS */
.chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;}
.chip-conf{background:rgba(61,214,140,0.15);color:var(--green);}
.chip-proy{background:rgba(245,197,66,0.12);color:var(--amber);}
.chip-sinop{background:rgba(255,255,255,0.05);color:var(--text3);}
.chip-etc{background:var(--green);color:#0a0f0d;}
.chip-hoy{background:rgba(91,163,245,0.15);color:var(--blue);}
.chip-real{background:rgba(61,214,140,0.25);color:var(--green);border:1px solid rgba(61,214,140,0.4);}

.in-v{color:var(--green)!important;}
.out-v{color:var(--blue)!important;}
.proy-v{color:var(--amber)!important;}

/* LEGEND */
.legend-row{display:flex;gap:18px;margin-bottom:14px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--text3);}
.leg{display:flex;align-items:center;gap:6px;}
.leg-box{width:26px;height:14px;border-radius:3px;border:1px solid;}

/* SAVE BAR */
.save-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.save-dot{width:7px;height:7px;border-radius:99px;background:var(--green-dim);}
.save-dot.dirty{background:var(--amber);}
.save-hint{font-size:11px;color:var(--text3);font-style:italic;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:26px;width:500px;max-width:95vw;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:var(--sans);font-size:17px;font-weight:700;color:var(--text);margin-bottom:18px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 11px;}
.form-input:focus{outline:none;border-color:var(--green);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--text3);}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.35;}
.empty-title{font-family:var(--sans);font-size:17px;font-weight:700;color:var(--text2);margin-bottom:8px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px;}
</style>
</head>

<script>
const TON_CAM = 29;
const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
// Helper: construye fecha local sin desfase de timezone
function makeDate(y,m,d){ const dt=new Date(y,m,d,12,0,0); return dt; }
function dayLabel(dt){ return DOW[dt.getDay()]+' '+dt.getDate()+'/'+(dt.getMonth()+1); }
let vessels = [], activeIdx = null, dirty = false;

// ── PERSISTENCIA ──────────────────────────────────────────────────────
const GITHUB_REPO  = 'sovoilar/SUNFLOW-';
const GITHUB_FILE  = 'index.html';
const LS_KEY       = 'sunflow_state';

function markDirty(){
  dirty=true;
  const d=document.getElementById('save-dot-hdr'); if(d){d.className='save-dot dirty';}
  const t=document.getElementById('save-txt-hdr'); if(t){t.textContent='Cambios sin publicar';}
  autoSaveLocal();
}
function markClean(){
  dirty=false;
  const d=document.getElementById('save-dot-hdr'); if(d){d.className='save-dot';}
  const t=document.getElementById('save-txt-hdr'); if(t){t.textContent='Publicado ✓';}
}

function autoSaveLocal(){
  try{
    const data=vessels.map(v=>({...v,etb:v.etb.toISOString(),cupos:v.cupos.map(c=>({...c,date:c.date.toISOString()}))}));
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }catch(e){}
}

function loadFromLocal(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data=JSON.parse(raw);
    vessels=data.map(v=>({...v,etb:new Date(v.etb),cupos:v.cupos.map(c=>({...c,date:new Date(c.date)}))}));
    activeIdx=0; return true;
  }catch(e){ return false; }
}

async function publishToGitHub(){
  try{
    // Construir el nuevo initDefault con el estado actual
    const stateData = vessels.map(v=>({...v,etb:v.etb.toISOString(),cupos:v.cupos.map(c=>({...c,date:c.date.toISOString()}))}));
    const newInitBlock = buildInitBlock(stateData);

    // Tomar el HTML del documento actual en memoria (sin fetch)
    const currentHtml = document.documentElement.outerHTML;
    const initRegex = /function initDefault\(\)[\s\S]*?vessels\.push\(v\);activeIdx=0;\s*\}/;
    const updatedHtml = currentHtml.replace(initRegex, newInitBlock);

    // Descargar
    const blob = new Blob([updatedHtml], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    markClean();
    setTimeout(()=>{
      alert('✅ index.html descargado.\n\nSubilo a GitHub:\ngithub.com/sovoilar/SUNFLOW-\n→ Add file → Upload files → Commit changes');
    }, 300);
  }catch(err){
    alert('Error al exportar: '+err.message);
  }
}

function resetToken(){
  if(confirm('¿Querés cambiar el GitHub Token?')){
    localStorage.removeItem('sunflow_gh_token');
    alert('Token borrado. La próxima vez que publiques te lo va a pedir de nuevo.');
  }
}

function buildInitBlock(data){
  const v=data[0];
  const cuposJs = v.cupos.map(c=>`    {sc:${c.camSFS_conf||0},hc:${c.camHO_conf||0},sp:${c.camSFS_proy||0},hp:${c.camHO_proy||0},ot:${c.outTurnos||0},or_:${c.outReal||0},tpt:${c.tonPorTurno||2500},dom:${c.sinOp?'true':'false'},etb:${c.esETB?'true':'false'},lbl:'${c.label}'}`).join(',\n');
  return `function initDefault(){
  const etb=makeDate(2026,4,9);
  const v={id:${v.id},nombre:'${v.nombre}',puerto:'${v.puerto}',
    sfsObj:${v.sfsObj},hoObj:${v.hoObj},sfsIni:${v.sfsIni},hoIni:${v.hoIni},etb,tonPorTurno:${v.tonPorTurno},cupos:[]};
  const dd=[
${cuposJs}
  ];
  dd.forEach((d,i)=>{
    const dt=new Date(d.lbl.includes('5/5')?makeDate(2026,4,5):
              d.lbl.includes('6/5')?makeDate(2026,4,6):
              d.lbl.includes('7/5')?makeDate(2026,4,7):
              d.lbl.includes('8/5')?makeDate(2026,4,8):
              d.lbl.includes('9/5')?makeDate(2026,4,9):
              d.lbl.includes('10/5')?makeDate(2026,4,10):
              d.lbl.includes('11/5')?makeDate(2026,4,11):
              d.lbl.includes('12/5')?makeDate(2026,4,12):
              d.lbl.includes('13/5')?makeDate(2026,4,13):makeDate(2026,4,14));
    v.cupos.push({date:dt,label:d.lbl,
      camSFS_conf:d.sc,camHO_conf:d.hc,camSFS_proy:d.sp,camHO_proy:d.hp,
      outTurnos:d.ot,outReal:d.or_,tonPorTurno:d.tpt,sinOp:d.dom,esETB:d.etb});
  });
  vessels.push(v);activeIdx=0;
}`;
}

function saveState(){
  autoSaveLocal();
  const data=vessels.map(v=>({...v,etb:v.etb.toISOString(),cupos:v.cupos.map(c=>({...c,date:c.date.toISOString()}))}));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='sunflow_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  markClean();
}

function loadState(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      vessels=data.map(v=>({...v,etb:new Date(v.etb),cupos:v.cupos.map(c=>({...c,date:new Date(c.date)}))}));
      activeIdx=0; markClean(); autoSaveLocal(); render();
    }catch(err){alert('Error al cargar archivo');}
  };
  reader.readAsText(file);
}

// ── CÁLCULO ───────────────────────────────────────────────────────────
function calcFlow(v){
  let sfsStk=v.sfsIni, hoStk=v.hoIni, sfsCarg=0, hoCarg=0;
  const rows=[];
  v.cupos.forEach((c,i)=>{
    const inSFS_c=(c.camSFS_conf||0)*TON_CAM, inHO_c=(c.camHO_conf||0)*TON_CAM;
    const inSFS_p=(c.camSFS_proy||0)*TON_CAM, inHO_p=(c.camHO_proy||0)*TON_CAM;
    sfsStk+=inSFS_c+inSFS_p; hoStk+=inHO_c+inHO_p;

    const sfsPend=Math.max(0,v.sfsObj-sfsCarg), hoPend=Math.max(0,v.hoObj-hoCarg);
    // OUT: puede ser turnos proyectados O tons reales ingresadas ese día
    let outTarget=0;
    if(c.outReal!=null && c.outReal>0){
      outTarget=c.outReal; // valor real ingresado
    } else {
      outTarget=(c.outTurnos===-1)?(sfsPend+hoPend):(c.outTurnos||0)*(c.tonPorTurno||v.tonPorTurno);
    }
    const dispSFS=Math.min(sfsStk,sfsPend), dispHO=Math.min(hoStk,hoPend), dispTot=dispSFS+dispHO;
    const outAct=Math.min(outTarget,dispTot);
    let outSFS=0,outHO=0;
    if(outAct>0&&dispTot>0){
      outSFS=Math.min(Math.round(outAct*dispSFS/dispTot),sfsPend,sfsStk);
      outHO=Math.min(outAct-outSFS,hoPend,hoStk);
    }
    sfsCarg+=outSFS; hoCarg+=outHO; sfsStk-=outSFS; hoStk-=outHO;

    const turnos=(c.outTurnos===-1)?Math.ceil(outAct/(c.tonPorTurno||v.tonPorTurno)):(c.outTurnos||0);
    rows.push({
      idx:i, label:c.label, sinOp:c.sinOp, esETB:c.esETB,
      camSFS_conf:c.camSFS_conf||0, camHO_conf:c.camHO_conf||0,
      camSFS_proy:c.camSFS_proy||0, camHO_proy:c.camHO_proy||0,
      outTurnos:c.outTurnos||0, outReal:c.outReal||0,
      tonPorTurno:c.tonPorTurno||v.tonPorTurno,
      inSFS_c,inHO_c,inSFS_p,inHO_p,
      inTot:inSFS_c+inHO_c+inSFS_p+inHO_p,
      outAct:Math.round(outAct), turnos,
      sfsStk:Math.round(sfsStk), hoStk:Math.round(hoStk),
      stockTot:Math.round(sfsStk+hoStk),
      sfsCarg:Math.round(sfsCarg), hoCarg:Math.round(hoCarg),
      done:sfsCarg>=v.sfsObj&&hoCarg>=v.hoObj,
      esReal: c.outReal!=null&&c.outReal>0,
    });
  });
  return {rows,sfsCarg:Math.round(sfsCarg),hoCarg:Math.round(hoCarg)};
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderSidebar(){
  const el=document.getElementById('vessel-list'); el.innerHTML='';
  vessels.forEach((v,i)=>{
    const {sfsCarg,hoCarg}=calcFlow(v);
    const pct=Math.min(100,Math.round((sfsCarg+hoCarg)/(v.sfsObj+v.hoObj)*100));
    const d=document.createElement('div');
    d.className='vessel-item'+(i===activeIdx?' active':'');
    d.innerHTML=`<div class="vessel-name">${v.nombre}</div>
      <div class="vessel-sub">${v.puerto} · ${pct}% cargado</div>
      <div class="vessel-bar"><div class="vessel-fill" style="width:${pct}%"></div></div>`;
    d.onclick=()=>{activeIdx=i;render();};
    el.appendChild(d);
  });
}

function renderMain(){
  document.getElementById('empty-state').style.display=vessels.length?'none':'block';
  document.getElementById('vessel-detail').style.display=vessels.length?'block':'none';
  if(!vessels.length)return;

  const v=vessels[activeIdx];
  const {rows,sfsCarg,hoCarg}=calcFlow(v);
  const totalObj=v.sfsObj+v.hoObj, totalCarg=sfsCarg+hoCarg;
  const pctSFS=Math.min(100,Math.round(sfsCarg/v.sfsObj*100));
  const pctHO=Math.min(100,Math.round(hoCarg/v.hoObj*100));
  const etcRow=rows.find(r=>r.done&&r.outAct>0);
  const turnosTotal=Math.ceil(totalObj/v.tonPorTurno);
  const totCamC=v.cupos.reduce((a,c)=>a+(c.camSFS_conf||0)+(c.camHO_conf||0),0);
  const totCamP=v.cupos.reduce((a,c)=>a+(c.camSFS_proy||0)+(c.camHO_proy||0),0);

  let html=`
  <div class="save-bar">
    <span class="save-dot${dirty?' dirty':''}" id="save-dot-main"></span>
    <span class="save-hint">${dirty?'Cambios sin guardar':'Todo guardado'}</span>
  </div>

  <div class="kpi-grid">
    <div class="kpi green"><div class="kpi-label">Cargado SFS</div><div class="kpi-val">${fmt(sfsCarg)}</div><div class="kpi-sub">de ${fmt(v.sfsObj)} t · ${pctSFS}%</div></div>
    <div class="kpi blue"><div class="kpi-label">Cargado HO</div><div class="kpi-val">${fmt(hoCarg)}</div><div class="kpi-sub">de ${fmt(v.hoObj)} t · ${pctHO}%</div></div>
    <div class="kpi amber">
      <div class="kpi-label">Camiones cupeados</div>
      <div class="kpi-val">${totCamC+totCamP}</div>
      <div class="kpi-sub">Conf: ${totCamC} · Proy: ${totCamP}</div>
    </div>
    </div>
    <!-- segunda fila KPIs -->
    <div class="kpi-grid" style="margin-top:-2px;">
    <div class="kpi" style="border-color:rgba(61,214,140,0.2);">
      <div class="kpi-label">Equiv. stock SFS</div>
      <div class="kpi-val" style="color:var(--green);font-size:20px;">${Math.round(v.sfsIni/TON_CAM)}</div>
      <div class="kpi-sub">camiones · ${fmt(v.sfsIni)} t en puerto</div>
    </div>
    <div class="kpi" style="border-color:rgba(91,163,245,0.2);">
      <div class="kpi-label">Equiv. stock HO</div>
      <div class="kpi-val" style="color:var(--blue);font-size:20px;">${Math.round(v.hoIni/TON_CAM)}</div>
      <div class="kpi-sub">camiones · ${fmt(v.hoIni)} t en puerto</div>
    </div>
    <div class="kpi" style="border-color:rgba(245,197,66,0.2);">
      <div class="kpi-label">Stock total equiv.</div>
      <div class="kpi-val" style="color:var(--amber);font-size:20px;">${Math.round((v.sfsIni+v.hoIni)/TON_CAM)}</div>
      <div class="kpi-sub">camiones · ${fmt(v.sfsIni+v.hoIni)} t · ${Math.round((v.sfsIni+v.hoIni)/(v.sfsObj+v.hoObj)*100)}% del objetivo</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total camiones equiv.</div>
      <div class="kpi-val" style="font-size:20px;">${Math.round((v.sfsIni+v.hoIni)/TON_CAM) + totCamC + totCamP}</div>
      <div class="kpi-sub">stock + conf + proy · obj: ${Math.round((v.sfsObj+v.hoObj)/TON_CAM)} cam</div>
    </div>
    <div class="kpi white"><div class="kpi-label">ETC estimado</div><div class="kpi-val" style="font-size:16px;margin-top:4px;">${etcRow?etcRow.label:'—'}</div><div class="kpi-sub">${turnosTotal} turnos · ${fmt(v.tonPorTurno)} t/turno</div></div>
  </div>

  <div class="etc-banner">
    <div>
      <div class="etc-title">⚓ ${etcRow?'ETC: '+etcRow.label:'Completá los cupos para calcular ETC'}</div>
      <div class="etc-detail">${fmt(totalObj)} tons totales · ${turnosTotal} turnos de ${fmt(v.tonPorTurno)} t · ritmo 2 turnos/día</div>
    </div>
    <span class="etc-badge">SFS ${fmt(v.sfsObj)} t · HO ${fmt(v.hoObj)} t</span>
  </div>

  <div class="prog-wrap">
    <div class="prog-row">
      <div class="prog-hdr"><span class="prog-name">SFS — Girasol común</span><span class="prog-nums">${fmt(sfsCarg)} / ${fmt(v.sfsObj)} t · falta ${fmt(v.sfsObj-sfsCarg)} t</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pctSFS}%;background:var(--green);"></div></div>

    <div class="prog-row">
      <div class="prog-hdr"><span class="prog-name">HO — Alto oleico</span><span class="prog-nums">${fmt(hoCarg)} / ${fmt(v.hoObj)} t · falta ${fmt(v.hoObj-hoCarg)} t</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pctHO}%;background:var(--blue);"></div></div>
    </div>
  </div>

  <!-- PARÁMETROS EDITABLES -->
  <div class="config-panel">
    <div class="config-title">⚙ Parámetros de la operación</div>
    <div class="config-grid">
      <div class="config-item">
        <span class="config-label">Tons por turno (default)</span>
        <input class="config-input" type="number" value="${v.tonPorTurno}"

      </div>
      <div class="config-item">
        <span class="config-label">SFS objetivo total (tons)</span>
        <input class="config-input" type="number" value="${v.sfsObj}"
          oninput="updateVessel(${activeIdx},'sfsObj',this.value)">
      </div>
      <div class="config-item">
        <span class="config-label">HO objetivo total (tons)</span>
        <input class="config-input" type="number" value="${v.hoObj}"
          oninput="updateVessel(${activeIdx},'hoObj',this.value)">
      </div>
      <div class="config-item">
        <span class="config-label">Stock inicial SFS (tons)</span>
        <input class="config-input" type="number" value="${v.sfsIni}"
          oninput="updateVessel(${activeIdx},'sfsIni',this.value)">
      </div>
      <div class="config-item">
        <span class="config-label">Stock inicial HO (tons)</span>
        <input class="config-input" type="number" value="${v.hoIni}"
          oninput="updateVessel(${activeIdx},'hoIni',this.value)">
      </div>
      <div class="config-item">
        <span class="config-label">Puerto / Terminal</span>
        <input class="config-input" type="text" value="${v.puerto}"
          oninput="updateVesselStr(${activeIdx},'puerto',this.value)">
      </div>
    </div>
  </div>

  <div class="legend-row">
    <span>Celdas editables:</span>
    <span class="leg"><span class="leg-box" style="background:rgba(61,214,140,0.09);border-color:rgba(61,214,140,0.25);"></span><span style="color:var(--green);">Verde = confirmados (cupos acordados)</span></span>
    <span class="leg"><span class="leg-box" style="background:rgba(245,197,66,0.08);border-color:rgba(245,197,66,0.2);"></span><span style="color:var(--amber);">Naranja = proyectados</span></span>
    <span class="leg"><span class="leg-box" style="background:var(--blue-pale);border-color:rgba(91,163,245,0.2);"></span><span style="color:var(--blue);">Azul = carga buque (turnos proj. / tons reales)</span></span>
    <span style="margin-left:auto;color:var(--text3);">Camión ≈ 29 t</span>
  </div>

  <div class="table-wrap"><table>
    <thead>
      <tr class="th-grp">
        <th class="th-grp" style="text-align:left;padding-left:14px;">FECHA</th>
        <th class="th-grp">ESTADO</th>
        <th class="th-grp" colspan="2" style="color:var(--green);text-align:center;">▲ IN CONFIRMADOS</th>
        <th class="th-grp" colspan="2" style="color:var(--amber);text-align:center;">▲ IN PROYECTADOS</th>
        <th class="th-grp" style="color:var(--green);">IN TOTAL</th>
        <th class="th-grp" colspan="3" style="color:var(--blue);text-align:center;">▼ OUT EMBARQUE</th>
        <th class="th-grp" colspan="3" style="text-align:center;">STOCK PUERTO</th>
        <th class="th-grp">EMBARCADO</th>
      </tr>
      <tr>
        <th style="text-align:left;padding-left:14px;">Fecha</th>
        <th>Estado</th>
        <th style="color:var(--green);">Cam SFS conf</th>
        <th style="color:var(--green);">Cam HO conf</th>
        <th style="color:var(--amber);">Cam SFS proy</th>
        <th style="color:var(--amber);">Cam HO proy</th>
        <th style="color:var(--green);">IN (tons)</th>
        <th style="color:var(--blue);">T/turno real</th>
        <th style="color:var(--blue);">Turnos</th>
        <th style="color:var(--blue);">OUT (tons)</th>
        <th>SFS</th>
        <th>HO</th>
        <th>Total</th>
        <th>Acumulado</th>
      </tr>
    </thead>
    <tbody>`;

  rows.forEach((r,i)=>{
    let trCls='', chip='';
    const hasConf=r.camSFS_conf>0||r.camHO_conf>0;
    const hasProy=r.camSFS_proy>0||r.camHO_proy>0;
    if(r.sinOp){trCls='row-sinop';chip='<span class="chip chip-sinop">Sin op.</span>';}
    else if(r.done&&r.outAct>0){trCls='row-etc';chip='<span class="chip chip-etc">ETC ✓</span>';}
    else if(r.esReal){chip='<span class="chip chip-real">Real ✓</span>';}
    else if(i===0&&!hasConf&&!hasProy){chip='<span class="chip chip-hoy">Hoy</span>';}
    else if(hasConf&&!hasProy){chip='<span class="chip chip-conf">Confirmado</span>';}
    else if(hasConf&&hasProy){chip='<span class="chip chip-conf">Conf+Proy</span>';}
    else if(hasProy||r.outTurnos>0){chip='<span class="chip chip-proy">Proyectado</span>';}
    else{chip='<span class="chip chip-sinop">—</span>';}

    const dis=r.sinOp?'disabled':'';
    const vi=activeIdx, di=r.idx;

    html+=`<tr class="${trCls}">
      <td>${r.label}${r.esETB?' ⚓':''}</td>
      <td>${chip}</td>
      <td><input class="inp-conf" type="number" min="0" value="${r.camSFS_conf||''}" placeholder="0"
        oninput="upCupo(${vi},${di},'camSFS_conf',this.value)" ${dis}></td>
      <td><input class="inp-conf" type="number" min="0" value="${r.camHO_conf||''}" placeholder="0"
        oninput="upCupo(${vi},${di},'camHO_conf',this.value)" ${dis}></td>
      <td><input class="inp-proy" type="number" min="0" value="${r.camSFS_proy||''}" placeholder="0"
        oninput="upCupo(${vi},${di},'camSFS_proy',this.value)" ${dis}></td>
      <td><input class="inp-proy" type="number" min="0" value="${r.camHO_proy||''}" placeholder="0"
        oninput="upCupo(${vi},${di},'camHO_proy',this.value)" ${dis}></td>
      <td class="${r.inTot>0?'in-v':''}">${fmtN(r.inTot)}</td>
      <td><input class="inp-out" type="number" min="0" value="${r.tonPorTurno!==v.tonPorTurno?r.tonPorTurno:''}" placeholder="${v.tonPorTurno}"

      <td><input class="inp-out" type="number" min="0" value="${r.outTurnos>0&&r.outTurnos!==-1?r.outTurnos:''}" placeholder="0"
        oninput="upCupo(${vi},${di},'outTurnos',this.value)" ${dis}></td>
      <td><input class="inp-out" type="number" min="0" value="${r.outReal||''}" placeholder="calc"
        oninput="upCupo(${vi},${di},'outReal',this.value)" ${dis} title="Tons embarcadas reales (sobreescribe el cálculo)"></td>
      <td>${fmt(r.sfsStk)}</td>
      <td>${fmt(r.hoStk)}</td>

      <td class="${r.done?'in-v':''}" style="font-weight:500;">${fmt(r.sfsCarg+r.hoCarg)} / ${fmt(totalObj)}</td>
    </tr>`;
  });

  const totIN=rows.reduce((a,r)=>a+r.inTot,0);
  const totOUT=rows.reduce((a,r)=>a+r.outAct,0);
  const totSc=v.cupos.reduce((a,c)=>a+(c.camSFS_conf||0),0);
  const totHc=v.cupos.reduce((a,c)=>a+(c.camHO_conf||0),0);
  const totSp=v.cupos.reduce((a,c)=>a+(c.camSFS_proy||0),0);
  const totHp=v.cupos.reduce((a,c)=>a+(c.camHO_proy||0),0);

  html+=`<tr class="row-total">
    <td>TOTALES</td><td></td>
    <td class="in-v">${totSc}</td><td class="in-v">${totHc}</td>
    <td class="proy-v">${totSp}</td><td class="proy-v">${totHp}</td>
    <td class="in-v">${fmt(totIN)}</td>
    <td></td><td></td>
    <td class="out-v">${fmt(totOUT)}</td>
    <td></td><td></td><td></td>
    <td class="in-v">${fmt(totalCarg)} / ${fmt(totalObj)}</td>
  </tr>`;

  html+=`</tbody></table></div>
  <div style="display:flex;gap:8px;align-items:center;padding-bottom:20px;">
    <button class="btn btn-sm" onclick="addDay(${activeIdx})">+ Agregar día</button>
    <button class="btn btn-sm btn-red" onclick="removeLastDay(${activeIdx})">− Quitar último</button>
    <span style="font-size:11px;color:var(--text3);margin-left:4px;">Col. "T/turno real": sobreescribí el default día a día · Col. "OUT tons": ingresá el real embarcado</span>
  </div>`;

  document.getElementById('vessel-detail').innerHTML=html;
}

function render(){ renderSidebar(); renderMain(); }

// ── ACCIONES ──────────────────────────────────────────────────────────
function upCupo(vi,di,field,val){
  const n=parseFloat(val);
  vessels[vi].cupos[di][field]=isNaN(n)?0:n;
  markDirty(); render();
}
function updateVessel(vi,field,val){
  const n=parseInt(val); vessels[vi][field]=isNaN(n)?0:n;
  markDirty(); render();
}
function updateVesselStr(vi,field,val){
  vessels[vi][field]=val; markDirty(); render();
}
function addDay(vi){
  const v=vessels[vi], last=v.cupos[v.cupos.length-1];
  const d=new Date(last.date); d.setDate(d.getDate()+1);
  const dow=d.getDay();
  v.cupos.push({date:new Date(d),label:dayLabel(d),
    camSFS_conf:0,camHO_conf:0,camSFS_proy:0,camHO_proy:0,
    outTurnos:dow===0?0:2,outReal:0,tonPorTurno:v.tonPorTurno,sinOp:dow===0,esETB:false});
  markDirty(); render();
}
function removeLastDay(vi){
  if(vessels[vi].cupos.length>2){vessels[vi].cupos.pop();markDirty();render();}
}
function openNewVessel(){
  document.getElementById('modal-overlay').classList.remove('hidden');
  const d=new Date();d.setDate(d.getDate()+4);
  document.getElementById('f-etb').value=d.toISOString().split('T')[0];
}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
function createVessel(){
  const nombre=document.getElementById('f-nombre').value||'Nuevo buque';
  const puerto=document.getElementById('f-puerto').value||'Puerto';
  const sfsObj=parseInt(document.getElementById('f-sfs-obj').value)||0;
  const hoObj=parseInt(document.getElementById('f-ho-obj').value)||0;
  const sfsIni=parseInt(document.getElementById('f-sfs-ini').value)||0;
  const hoIni=parseInt(document.getElementById('f-ho-ini').value)||0;
  const etbStr=document.getElementById('f-etb').value;
  const tonPorTurno=parseInt(document.getElementById('f-turno').value)||2500;
  const etb=etbStr?new Date(etbStr+'T12:00:00'):new Date();
  const start=new Date(etb);start.setDate(etb.getDate()-4);
  const v={id:Date.now(),nombre,puerto,sfsObj,hoObj,sfsIni,hoIni,etb,tonPorTurno,cupos:[]};
  for(let i=0;i<14;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const dow=d.getDay();
    v.cupos.push({date:new Date(d),label:dayLabel(d),
      camSFS_conf:0,camHO_conf:0,camSFS_proy:0,camHO_proy:0,
      outTurnos:(d>=etb&&dow!==0)?2:0,outReal:0,tonPorTurno,sinOp:dow===0,esETB:d.toDateString()===etb.toDateString()});
  }
  vessels.push(v);activeIdx=vessels.length-1;closeModal();markDirty();render();
}

render();
// Marcar estado inicial
setTimeout(()=>{ const t=document.getElementById('save-txt-hdr'); if(t&&!dirty)t.textContent='Guardado localmente'; },100);
</script>
